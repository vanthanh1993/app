<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quản Lý Shop</title>

<link rel="icon" href="{{ url_for('static', filename='star1.png') }}">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS GLOBAL -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">

<!-- PAGE CSS -->
{% block css %}{% endblock %}

</head>

<body>

<!-- NAVBAR -->
{% if current_user.is_authenticated %}
<nav class="navbar navbar-dark bg-dark px-2">

    <span class="navbar-brand">📱 Shop</span>

    <div class="d-none d-md-flex gap-3">

        <a class="nav-link text-white" href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
        <a class="nav-link text-white" href="{{ url_for('purchase.purchase') }}">Nhập</a>
        <a class="nav-link text-white" href="{{ url_for('sale.sale_page') }}">Bán</a>
        <a class="nav-link text-white" href="{{ url_for('supplier.suppliers') }}">NCC</a>
        <a class="nav-link text-white" href="{{ url_for('customer.customers') }}">KH</a>
        <a class="nav-link text-danger" href="{{ url_for('auth.logout') }}">Logout</a>

    </div>

</nav>
{% endif %}


<!-- CONTENT -->
<div class="container py-3">
{% block content %}{% endblock %}
</div>


<!-- MOBILE NAV -->
{% if current_user.is_authenticated %}
<div class="bottom-nav d-md-none">

    <a href="{{ url_for('dashboard.dashboard') }}">🏠</a>
    <a href="{{ url_for('purchase.purchase_page') }}">📥</a>
    <a href="{{ url_for('sale.sale_page') }}">💰</a>
    <a href="{{ url_for('supplier.suppliers') }}">🏭</a>
    <a href="{{ url_for('customer.customers') }}">👤</a>

</div>
{% endif %}


<!-- TOAST -->
<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center border-0">
        <div class="d-flex">
            <div id="toastMsg" class="toast-body"></div>
        </div>
    </div>
</div>


<!-- JS CORE -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/core.js') }}"></script>
<script src="{{ url_for('static', filename='js/ui.js') }}"></script>


<!-- PAGE JS -->
{% block scripts %}{% endblock %}

</body>
</html>
