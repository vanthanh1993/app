{% extends "base.html" %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/sale.css') }}">
{% endblock %}

{% block content %}

<div class="container px-2 py-2">

<h5 class="mb-2">🛒 Bán hàng</h5>

<!-- CUSTOMER -->
<select id="customer" class="form-control mb-2">
{% for c in customers %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>

<!-- CART -->
<div id="list"></div>

<!-- EMPTY -->
<div id="empty" class="text-center text-muted py-4">
Chưa có sản phẩm nào được chọn
</div>

<!-- IMEI INPUT -->
<div class="card imei-card shadow-sm mb-3">

    <div class="card-body">

        <div class="fw-semibold mb-2">📥 Nhập IMEI</div>

        <div id="imeiStatus" class="imei-status mb-2"></div>

        <textarea id="imei_input"
            class="form-control imei-textarea"
            rows="4"
            placeholder="Nhập IMEI, mỗi dòng 1 cái"></textarea>

        <div class="imei-hint mt-2">
            💡 Dán nhiều IMEI để tạo đơn nhanh
        </div>

    </div>

</div>

</div>

<!-- TOTAL BAR -->
<div id="total-bar">
    <div class="d-flex justify-content-between align-items-center">

        <div>
            <div class="small text-muted">Tổng tiền</div>
            <b id="total" class="text-success">0 đ</b>
        </div>

        <button id="btnSave" class="btn btn-success">
            💾 Tạo Đơn
        </button>

    </div>
</div>

{% endblock %}


{% block scripts %}
<script>
const API_CHECK = "{{ url_for('sale.check_imei') }}";
const API_SAVE  = "{{ url_for('sale.sale_page') }}";
</script>

<script src="{{ url_for('static', filename='js/pages/sale.js') }}"></script>
{% endblock %}
