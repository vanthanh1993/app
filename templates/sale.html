{% extends "base.html" %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/sale.css') }}">
{% endblock %}

{% block content %}

<div class="container px-2 py-2">

<h5 class="mb-2">🛒 Bán hàng</h5>

<select id="customer" class="form-control mb-2">
{% for c in customers %}
<option value="{{ c.id }}">{{ c.name }}</option>
{% endfor %}
</select>

<div id="list"></div>

<div id="empty" class="text-center text-muted py-4">
Chưa có sản phẩm nào được chọn
</div>

<div class="card imei-card shadow-sm mb-3">
    <div class="card-body">

        <div class="imei-header mb-2">
            <div id="imeiStatus" class="imei-status mt-1"></div>
        </div>

        <textarea id="imei_input"
            class="form-control imei-textarea"
            rows="4"
            placeholder="Nhập IMEI, Ấn Enter để xuống dòng"></textarea>

        <div class="imei-hint mt-2">
            💡 Dán nhiều IMEI để tạo đơn nhanh
        </div>

    </div>
</div>

</div>

<div id="total-bar">
    <div class="d-flex justify-content-between align-items-center">

        <div>
            <div class="small text-muted">Tổng tiền</div>
            <b id="total" class="text-success">0 đ</b>
        </div>

        <button id="saveBtn" class="btn btn-success">
            💾 Tạo Đơn
        </button>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/sale.js') }}"></script>
{% endblock %}
